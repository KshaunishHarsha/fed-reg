# Federal Register Sentinel — Keyword Configuration
#
# anchor_terms:  A single match immediately flags a document as HIGH confidence.
#                Edit these when a major animal law statute or term is missing.
#
# context_terms: Each match scores +1 point. A document needs CONTEXT_THRESHOLD
#                points (currently 2) to pass as NEEDS_CONFIRMATION.
#                Edit these to broaden or narrow topical coverage.
#
# noise_title_keywords: Documents of type NOTICE whose title contains any of
#                       these are discarded before keyword scoring.
#                       Edit these to suppress persistent false-positive sources.


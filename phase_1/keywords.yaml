# ═══════════════════════════════════════════════════════════════════════════════
# Federal Register Sentinel — Keyword Configuration v2
# Animal Legal Defense Fund | Open Paws Platform
# Monitoring agencies: USDA, FDA, NOAA, Fish & Wildlife Service, NIH
# ═══════════════════════════════════════════════════════════════════════════════
#
# ARCHITECTURE:
#   anchor_terms              → single substring match = HIGH CONFIDENCE
#   anchor_terms_word_boundary → single \b word-boundary match = HIGH CONFIDENCE
#                                (abbreviations only — prevents "awa" in "award")
#   context_terms             → each match = +1 point; reach CONTEXT_THRESHOLD (2) to pass
#   noise_title_keywords      → NOTICE documents with these in the title are DISCARDED
#                               before any scoring. Be conservative — false negatives hurt.
#
# ─────────────────────────────────────────────────────────────────────────────
# MATCHING NOTES:
#
#   1. All matching is performed CASE-INSENSITIVELY on lowercased text.
#
#   2. MULTI-WORD PHRASES (e.g. "animal welfare act") are safe to substring-match
#      because the combination is already unambiguous.
#
#   3. SHORT ABBREVIATIONS must go in anchor_terms_word_boundary, not here.
#      They are matched as \bTERM\b to avoid substring collisions.
#      ESA, MBTA, and HPA are excluded entirely — too ambiguous even with word boundaries.
#      CITES is excluded — "cites" is a common verb; the full phrase is in anchor_terms.
#
#   4. PLURALS are handled automatically: "puppy mill" matches "puppy mills".
#
#   5. HYPHENATED VARIANTS: "cage-free" and "cage free" may both appear.
# ─────────────────────────────────────────────────────────────────────────────


